<div class="p-3 d-flex flex-column h-100 w-100 card data-card simple-card-shell">
    <p>{{title()}}</p>
    <hr>
    <div class="d-flex h-100 align-items-center justify-content-center simple-card-shell__content">
        @if(text()){
        <p class="display-6">{{text()}}</p>
        }
        @else {
        <div class="d-flex flex-column">
            <p-skeleton class="mb-2" borderRadius="16px" />
            <p-skeleton width="4vw" class="mb-2" borderRadius="16px" />
            <p-skeleton width="2vw" class="mb-2" borderRadius="16px" />
        </div>
        }
    </div>
</div>
