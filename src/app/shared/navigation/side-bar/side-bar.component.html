<nav class="d-flex flex-column h-100 p-2 sidebar-nav">
  <ul class="list-unstyled mt-3 p-0 w-100">
    @if (currentSubRoutes(); as routes) {
    <li *ngFor="let item of routes; let i = index" class="mb-1 w-100">
      <a class="d-flex align-items-center rounded link-secondary link-underline-opacity-0 py-2 px-3 w-100 nav-item-link"
        [routerLink]="buildRouteLink(item.route)"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="sidebarItemClickEvent(i)">
        <span class="text-truncate">{{ item.name }}</span>
      </a>
    </li>
    }
  </ul>
</nav>
