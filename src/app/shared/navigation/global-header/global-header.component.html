<nav #globalHeader class="navbar navbar-expand-lg navbar-light bg-success-subtle px-2">
  <a class="navbar-brand d-flex align-items-center me-4" href="#">
    <img src="ethos35.png" width="100" alt="logo da firma" class="me-2">
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarLinks"
    aria-controls="navbarLinks" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse justify-content-end" id="navbarLinks">
    <ul class="navbar-nav">
      @for (item of navigationRoutes(); track $index) {
      <li class="nav-item">
        <a routerLinkActive="active" [routerLink]="breakRoute(item.route)" class="nav-link fs-6 fs-md-5 fs-lg-4">
          {{ item.name }}
        </a>
      </li>
      }
    </ul>

    <div class="d-flex align-items-center ms-3">
      <button class="btn btn-group" (click)="op.toggle($event)">
        <app-user-profile-avatar [selfProfile]="true"></app-user-profile-avatar>
      </button>
      <p-popover #op>
        <app-user-detail (onClose)="op.hide()"></app-user-detail>
      </p-popover>
    </div>
  </div>
</nav>
