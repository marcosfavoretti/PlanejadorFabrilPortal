@if (itens) {
<p-toast />
<p-confirmDialog/>
<div class="d-flex flex-column checklist-result-list" [class.has-sticky-toolbar]="stickyToolbar">
  @if (submitButton && showToolbarActions) {
    <div class="checklist-toolbar-panel mb-3" [class.is-sticky]="stickyToolbar">
      <div class="checklist-toolbar-panel__search">
        <div class="search-box-container d-flex align-items-center flex-grow-1">
          <div class="d-flex justify-content-center align-items-center ps-3">
            <i class="pi pi-search search-icon"></i>
          </div>
          <input type="text" 
                 placeholder="Pesquisa rápida (Código)..." 
                 (input)="applyFilterGlobal($event, 'contains')"
                 class="form-control form-control-sm border-0 shadow-none ps-2 bg-transparent" />
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 checklist-action-panel__actions">
        <button type="button"
                (click)="resetCheckList($event)"
                class="btn btn-outline-secondary btn-sm px-3 d-flex align-items-center justify-content-center shadow-sm">
          <i class="pi pi-refresh me-2"></i>
          Novo CheckList
        </button>
        <button name="submit"
                class="btn btn-success btn-sm px-4 d-flex align-items-center justify-content-center shadow-sm"
                (click)="formsSubmitted()">
          <i class="pi pi-send me-2"></i>
          Enviar Checklist
        </button>
      </div>
    </div>
  } @else {
    <div class="checklist-toolbar-panel mb-3">
      <div class="checklist-toolbar-panel__search">
        <div class="search-box-container d-flex align-items-center flex-grow-1">
          <div class="d-flex justify-content-center align-items-center ps-3">
            <i class="pi pi-search search-icon"></i>
          </div>
          <input type="text" 
                 placeholder="Pesquisa rápida (Código)..." 
                 (input)="applyFilterGlobal($event, 'contains')"
                 class="form-control form-control-sm border-0 shadow-none ps-2 bg-transparent" />
        </div>
      </div>
    </div>
  }
  <div class="checklist-table-wrapper">
    <app-table-dynamic #dt [data]="itens" [tableModel]="tableModel" (OnChecked)="onTableChecked($event)"
      [scrollable]="false" [exportable]="exportable">
    </app-table-dynamic>
  </div>
</div>
}
