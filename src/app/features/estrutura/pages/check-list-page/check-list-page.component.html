<div class="h-100 d-flex flex-column p-4 bg-light overflow-auto">
  <!-- Header Section -->
  <div class="mb-4">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <h1 class="text-success-emphasis fw-bold mb-1">Checklist de Separação</h1>
        <p class="text-secondary lead mb-0">Gerencie a coleta e conferência de componentes.</p>
      </div>
      <div class="bg-success-subtle p-3 rounded-circle d-none d-md-flex">
        <i class="pi pi-check-square text-success" style="font-size: 1.5rem"></i>
      </div>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-grow-1">
    <app-item-painel #painel (onSubmitResponse)="handleRequests($event)" [modo]="'coleta'"
      [filters]="filters" [paginator]="false" [cardMode]="true" [showFilterBar]="false" [exportable]="false"
      [stickyChecklistHeader]="true"></app-item-painel>
  </div>
</div>
