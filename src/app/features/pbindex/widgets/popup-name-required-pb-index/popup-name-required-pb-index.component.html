<div class="bg-white">
    <form #forms='ngForm' class="d-flex flex-column gap-2" (ngSubmit)="checkResponse(forms)">
        <label for="nome">Nome:</label>

        <button class="btn btn-success" name="submit" type="submit">OK</button>
    </form>
</div>
