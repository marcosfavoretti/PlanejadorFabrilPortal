pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;

    server {
        listen 8085;
        server_name _;
        root /usr/share/nginx/html;
       
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
