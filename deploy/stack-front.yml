version: '3.8'

services:
  ethosfront:
    # IMAGE_TAG deve ser definido pelo pipeline para evitar fallback silencioso.
    image: ghcr.io/marcosfavoretti/planejadorfabrilportal:${IMAGE_TAG}

    ports:
      - "${DEPLOY_PORT:-8085}:8085"

    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      # As variáveis de API agora são embutidas no build Angular durante o CI/CD.
      # O container final não depende mais desses envs para iniciar.

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == marcos-Virtual-Machine

    networks:
      - backend-network
    dns:
      - 192.168.99.110
      - 192.168.99.106

networks:
  backend-network:
    external: true
    name: ethos_backend-network
