version: '3.8'

services:
  ethosfront:
    # Aponte para a imagem gerada pelo CI/CD
    # Substitua SEU_USUARIO e SEU_REPOSITORIO pelos dados reais (tudo minĂşsculo)
    image: ghcr.io/${GITHUB_USER_OR_ORG}/${GITHUB_REPOSITORY}:main
    
    container_name: ethosfront
    restart: always # Importante para produĂ§ĂŁo/homologaĂ§ĂŁo
    ports:
      - "${DEPLOY_PORT}:8085"
    
    # Se vocĂŞ quiser que o Docker sempre verifique se hĂˇ uma versĂŁo nova na main
    pull_policy: always
    
    # Ă‰ aqui que o --add-host entra na Stack
    extra_hosts:
      - "app.ethos.ind.br:192.168.99.156"
      - "app.prod.ethos:192.168.99.156"

    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      # ConfiguraĂ§Ăµes do Planejador
      - API_URL_PLANEJADOR=${API_URL_PLANEJADOR}
      - API_SWAGGER_PLANEJADOR=${API_SWAGGER_PLANEJADOR}
      # ConfiguraĂ§Ăµes de Rotas
      - API_URL_ROUTES=${API_URL_ROUTES}
      - API_SWAGGER_ROUTES=${API_SWAGGER_ROUTES}
      # ConfiguraĂ§Ăµes de Auth
      - API_URL_AUTH=${API_URL_AUTH}
      - API_SWAGGER_AUTH=${API_SWAGGER_AUTH}
      # ConfiguraĂ§Ăµes de Ponto
      - API_URL_RELOGIO=${API_URL_RELOGIO}
      - API_SWAGGER_RELOGIO=${API_SWAGGER_RELOGIO}
      # ConfiguraĂ§Ăµes de Certificados
      - API_URL_CERTIFICADOS=${API_URL_CERTIFICADOS}
      - API_SWAGGER_CERTIFICADOS=${API_SWAGGER_CERTIFICADOS}
      # Configuracao wifi
      - API_URL_WIFI=${API_URL_WIFI}
      - API_SWAGGER_WIFI=${API_SWAGGER_WIFI}
      #pb index
      - API_URL_PBINDEX=${API_URL_PBINDEX}
      - API_SWAGGER_PBINDEX=${API_SWAGGER_PBINDEX}
      # Configuracao buffer
      - API_URL_BUFFER=${API_URL_BUFFER}
      - API_SWAGGER_BUFFER=${API_SWAGGER_BUFFER}