name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: marcosfavoretti/planejadorfabrilportal

jobs:
  validate:
    runs-on: [self-hosted, Linux, X64, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate committed API client
        run: npm run check:api-client

      - name: Build Angular Application
        run: npm run build

  build-and-push:
    needs: validate
    runs-on: [self-hosted, Linux, X64, frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    needs: build-and-push
    runs-on: [self-hosted, Linux, X64, frontend]
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Run image for testing
        run: |
          IMAGE_URL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          docker pull $IMAGE_URL
          
          # Remove o container se ele já existir (de builds falhos anteriores)
          docker rm -f smoke-test-app || true
          
          # Tenta rodar em uma porta aleatória disponível para evitar conflitos no runner
          # Mas como o curl abaixo está fixo em 8086, vamos manter 8086 mas garantir o cleanup
          docker run -d --name smoke-test-app -p 8086:8085 $IMAGE_URL
          
          echo "Aguardando inicialização do Nginx..."
          sleep 5
          
          if curl -f http://localhost:8086/index.html > /dev/null; then
            echo "SUCCESS: Frontend acessível e retornando index.html"
            docker stop smoke-test-app
            docker rm smoke-test-app
          else
            echo "ERROR: Falha ao acessar o frontend após o build"
            docker logs smoke-test-app
            docker stop smoke-test-app
            docker rm smoke-test-app
            exit 1
          fi

  deploy:
    needs: smoke-test
    runs-on: [self-hosted, Linux, X64, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Swarm
        run: |
          # O IMAGE_TAG deve bater com o formato gerado pelo metadata-action: sha-<full-sha>
          export IMAGE_TAG=sha-${{ github.sha }}
          docker stack deploy -c deploy/stack-front.yml ethosfront --with-registry-auth
