name: CI Validation

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm run security:audit

      - name: Run GitLeaks
        run: npm run security:gitleaks

      - name: Run Semgrep
        run: npm run security:semgrep

      - name: Validate committed API client
        run: npm run check:api-client

      - name: Build Angular Application
        run: npm run build
